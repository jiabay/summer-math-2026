<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>咨询管理 · 思数培优</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333;padding:20px}
h1{color:#1a237e;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card .meta{display:flex;gap:20px;font-size:12px;color:#999;margin-bottom:6px}
.card .name{font-weight:700;font-size:16px;color:#1a237e}
.card .contact{color:#e65100;font-weight:700}
.card .msg{font-size:14px;margin-top:6px;line-height:1.6}
.empty{text-align:center;padding:60px;color:#999}
.refresh{position:fixed;bottom:20px;right:20px;background:#1a237e;color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:14px;cursor:pointer;font-weight:700}
.del{color:#c62828;cursor:pointer;float:right;font-size:12px}
</style></head>
<body>
<h1>📋 在线咨询记录</h1>
<div id="list"></div>
<button class="refresh" onclick="render()">🔄 刷新</button>
<script>
const PASS = 'sishu2026';
if(location.hash !== '#'+PASS){document.body.innerHTML='<div class=\"empty\"><h2>🔐 需要密码</h2><input id=\"pw\" type=\"password\" placeholder=\"输入管理密码\"><button onclick=\"location.hash=document.getElementById(\"pw\").value;location.reload()\">进入</button></div>';}

function render(){
  const msgs = JSON.parse(localStorage.getItem('sishu_consults')||'[]');
  const list = document.getElementById('list');
  if(msgs.length===0){list.innerHTML='<div class=\"empty\">暂未收到咨询</div>';return;}
  list.innerHTML = msgs.reverse().map((m,i)=>{
    const d = new Date(m.date);
    return '<div class=\"card\"><div class=\"meta\"><span>'+d.toLocaleString('zh-CN')+'</span></div><div class=\"name\">'+m.name+'</div><div class=\"contact\">📞 '+m.contact+' · '+m.grade+'</div><div class=\"msg\">'+m.msg+'</div><span class=\"del\" onclick=\"del('+i+')\">删除</span></div>';
  }).join('');
}
function del(i){
  const msgs = JSON.parse(localStorage.getItem('sishu_consults')||'[]');
  msgs.splice(msgs.length-1-i,1);
  localStorage.setItem('sishu_consults',JSON.stringify(msgs));
  render();
}
render();
</script>
</body></html>
